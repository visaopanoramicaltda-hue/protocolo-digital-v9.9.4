<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <!-- Viewport otimizada para Fullscreen e Notch/Ilha Dinâmica -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- THEME COLORS (PIANO BLACK) - Conformidade TWA -->
  <meta name="theme-color" content="#050505">
  <meta name="background-color" content="#050505">
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Simbiose">
  <meta name="apple-mobile-web-app-title" content="Simbiose">
  
  <!-- TWA/PWA Icons (PNG LOCAL) -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <title>Simbiose V9.9</title>
  
  <!-- PRELOAD CRITICAL ASSETS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://cdn.tailwindcss.com?v=3.4.17" as="script">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" as="script">
  
  <!-- MASTER ENGINE LIBRARIES -->
  <script src="https://cdn.tailwindcss.com?v=3.4.17"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            piano: { 950: '#000000', 900: '#050505', 800: '#141414', 700: '#1f1f1f' }
          },
          animation: {
            'fadeIn': 'fadeIn 0.3s ease-out'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* GLOBAL RESPONSIVE RESET */
    * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
        touch-action: manipulation; /* Prevents double-tap zoom */
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden; /* App-like feel, prevents body scroll */
        overscroll-behavior-y: none; /* Prevents pull-to-refresh on Android */
        -webkit-text-size-adjust: 100%;
        font-family: 'Inter', sans-serif;
        margin: 0;
        background-color: #050505; /* PIANO BLACK */
        color: #111827;
    }

    app-root {
        display: block;
        width: 100%;
        height: 100%;
    }

    .dark body { background-color: #050505; color: #f9fafb; }

    /* CUSTOM SCROLLBARS (Mobile Friendly) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: rgba(217, 119, 6, 0.5); border-radius: 10px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* IOS INPUT ZOOM FIX */
    @media screen and (max-width: 768px) {
        input, select, textarea {
            font-size: 16px !important; /* Prevents automatic zoom on focus */
        }
        /* Improve scrolling on mobile */
        .overflow-y-auto {
            -webkit-overflow-scrolling: touch;
        }
    }

    /* SAFE AREA INSETS (Notch/Dynamic Island Support) */
    .safe-area-pt { padding-top: max(env(safe-area-inset-top), 20px) !important; }
    .safe-area-pb { padding-bottom: max(env(safe-area-inset-bottom), 20px) !important; }
    .safe-area-pl { padding-left: max(env(safe-area-inset-left), 10px) !important; }
    .safe-area-pr { padding-right: max(env(safe-area-inset-right), 10px) !important; }

    /* Autofill Fix for Paper Theme */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px #FDFBF7 inset !important;
        -webkit-text-fill-color: #2a2320 !important;
        transition: background-color 5000s ease-in-out 0s;
    }
  </style>
