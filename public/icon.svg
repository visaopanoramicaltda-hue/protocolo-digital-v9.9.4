<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Leather Texture Gradient -->
    <radialGradient id="leather" cx="50%" cy="50%" r="75%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#5c3a21" />
      <stop offset="60%" stop-color="#3a2210" />
      <stop offset="100%" stop-color="#1f1005" />
    </radialGradient>
    <!-- Gold Foil Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf953f" />
      <stop offset="25%" stop-color="#fcf6ba" />
      <stop offset="50%" stop-color="#b38728" />
      <stop offset="75%" stop-color="#fbf5b7" />
      <stop offset="100%" stop-color="#aa771c" />
    </linearGradient>
  </defs>
  
  <!-- Main Cover (Full Bleed for Icon) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#leather)" />
  
  <!-- Spine Shadow & Highlight (Left side) -->
  <rect x="0" y="0" width="80" height="512" rx="0" fill="#1f1005" opacity="0.7" />
  <line x1="80" y1="0" x2="80" y2="512" stroke="#110802" stroke-width="12" opacity="0.9" />
  <line x1="88" y1="0" x2="88" y2="512" stroke="#ffffff" stroke-width="2" opacity="0.15" />
  
  <!-- Stitching -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="#a67c52" stroke-width="6" stroke-dasharray="16, 12" opacity="0.85" />
  
  <!-- Bookmark Ribbon -->
  <path d="M 360 0 L 420 0 L 420 512 L 390 470 L 360 512 Z" fill="#8b0000" />
  <path d="M 360 0 L 420 0 L 420 512 L 390 470 L 360 512 Z" fill="none" stroke="#4a0000" stroke-width="4" />
  
  <!-- Embossed Logo / Text (Gold Foil) -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.9" />
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.8" />
  
  <!-- Simbiose 'S' -->
  <text x="256" y="300" font-family="Georgia, serif" font-size="140" font-weight="bold" fill="url(#gold)" text-anchor="middle">S</text>
  
  <!-- Simbiose Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="28" font-weight="bold" letter-spacing="8" fill="url(#gold)" text-anchor="middle" opacity="0.9">SIMBIOSE</text>
</svg>
