  <style>
    /* GLOBAL RESPONSIVE RESET */
    * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
        touch-action: manipulation; /* Prevents double-tap zoom */
    }

    html, body {
        width: 100%;
        height: 100dvh; /* Força altura do viewport dinâmica */
        overflow: hidden; /* App-like feel, impede scroll no body */
        overscroll-behavior-y: none; /* Impede pull-to-refresh e o bounce que mostra barra de endereço */
        -webkit-text-size-adjust: 100%;
        font-family: 'Inter', sans-serif;
        margin: 0;
        background-color: #050505; /* PIANO BLACK */
        color: #111827;
    }

    app-root {
        display: block;
        width: 100%;
        height: 100%;
    }

    .dark body { background-color: #050505; color: #f9fafb; }

    /* CUSTOM SCROLLBARS (Mobile Friendly) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: rgba(217, 119, 6, 0.5); border-radius: 10px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* IOS INPUT ZOOM FIX */
    @media screen and (max-width: 768px) {
        input, select, textarea {
            font-size: 16px !important; /* Prevents automatic zoom on focus */
        }
        /* Improve scrolling on mobile */
        .overflow-y-auto {
            -webkit-overflow-scrolling: touch;
        }
    }

    /* SAFE AREA INSETS (Notch/Dynamic Island Support) */
    .safe-area-pt { padding-top: max(env(safe-area-inset-top), 20px) !important; }
    .safe-area-pb { padding-bottom: max(env(safe-area-inset-bottom), 20px) !important; }
    .safe-area-pl { padding-left: max(env(safe-area-inset-left), 10px) !important; }
    .safe-area-pr { padding-right: max(env(safe-area-inset-right), 10px) !important; }

    /* --- PROTOCOLO CAMUFLAGEM (ANTI-AUTOFILL GOOGLE) --- */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        transition: background-color 9999999s ease-in-out 0s, color 9999999s ease-in-out 0s;
        -webkit-text-fill-color: inherit !important;
        background-clip: content-box !important;
    }
  </style>
